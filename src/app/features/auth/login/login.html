<div class="login-container">
  <h1 class="app-gradient-title">Task Tracker</h1>
  <form nz-form [formGroup]="loginForm" class="login-form" (ngSubmit)="submitForm()">
    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your email!">
        <nz-input-wrapper nzPrefixIcon="user">
           <input type="text" nz-input formControlName="email" placeholder="Email" />
        </nz-input-wrapper>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-control [nzErrorTip]="passwordErrorTpl">
        <nz-input-wrapper nzPrefixIcon="lock">
          <input type="password" nz-input formControlName="password" placeholder="Password" />
        </nz-input-wrapper>
        <ng-template #passwordErrorTpl let-control>
          @if (control.hasError('required')) {
            Please input your password!
          } @else if (control.hasError('passwordStrength')) {
            Password must be min 6 chars, with upper, lower, number and special char.
          }
        </ng-template>
      </nz-form-control>
    </nz-form-item>
    <div nz-row class="login-form-margin">
      <div nz-col [nzSpan]="12">
        <label nz-checkbox formControlName="remember">
          <span>Remember me</span>
        </label>
      </div>

    </div>
    <button nz-button class="login-form-button login-form-margin" [nzType]
    ="'primary'">Log in</button>
    Or <a routerLink="/register">register now!</a>
  </form>
</div>
